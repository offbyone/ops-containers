---
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true},"80":{"HTTP":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:9090"}}},
          "$${TS_CERT_DOMAIN}:80":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:9090"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  sidecar:
    restart: unless-stopped
    extends:
      file: ../sidecar-compose.yaml
      service: .simple-sidecar
    hostname: prometheus
    environment:
      - TS_ACCEPT_DNS=true
    volumes:
      - prometheus-tailscale-data:/var/lib/tailscale

  prometheus:
    image: "prom/prometheus:v3.0.0"
    restart: always
    network_mode: "service:sidecar"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - /volume1/config/prometheus:/etc/prometheus
      - prometheus-storage:/prometheus
    healthcheck:
      test: ["CMD", "/bin/promtool", "check", "ready"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s

volumes:
  prometheus-storage:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /volume1/Backups/prometheus-data

  prometheus-tailscale-data:
