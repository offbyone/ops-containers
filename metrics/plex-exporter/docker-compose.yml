---
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true},"80":{"HTTP":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:9000"}}},
          "$${TS_CERT_DOMAIN}:80":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:9000"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  sidecar:
    extends:
      file: ../../sidecar-compose.yaml
      service: .simple-sidecar
    hostname: plex-exporter

  plex-exporter:
    image: "ghcr.io/jsclayton/prometheus-plex-exporter"
    # image: "ghcr.io/axsuul/plex-media-server-exporter:${PLEX_EXPORTER_POLLER_TAG}"
    network_mode: "service:sidecar"
    restart: always
    environment:
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_ADDR=${PLEX_ADDR}
      - PLEX_SERVER=${PLEX_ADDR}

volumes:
  tailscale-data:
