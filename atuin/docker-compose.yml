---
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true},"80":{"HTTP":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8888"}}},
          "$${TS_CERT_DOMAIN}:80":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8888"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":true}}

services:
  sidecar:
    restart: unless-stopped
    extends:
      file: ../sidecar-compose.yaml
      service: .simple-sidecar
    hostname: atuin

  atuin:
    image: ghcr.io/atuinsh/atuin:e737ba5 # v18.13.3
    network_mode: "service:sidecar"
    restart: always
    depends_on:
      - db
    command: start
    volumes:
      - atuin-config:/config
    environment:
      ATUIN_HOST: "0.0.0.0"
      ATUIN_OPEN_REGISTRATION: "true"
      ATUIN_DB_URI: postgres://$ATUIN_DB_USERNAME:$ATUIN_DB_PASSWORD@localhost/atuin
  db:
    image: postgres:14
    restart: always
    network_mode: "service:sidecar"
    volumes: # Don't remove permanent storage for index database files!
      - "atuin-data:/var/lib/postgresql/data/"
    environment:
      POSTGRES_USER: $ATUIN_DB_USERNAME
      POSTGRES_PASSWORD: $ATUIN_DB_PASSWORD
      POSTGRES_DB: atuin

volumes:
  tailscale-data:
  atuin-data:
  atuin-config:
    driver: local
    driver_opts:
      type: cifs
      device: //blob.camel-tortoise.ts.net/config/atuin
      o: username=${BLOB_USERNAME},password=${BLOB_PASSWORD},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,nounix,noserverino
