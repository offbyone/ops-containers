---
version: "3.7"
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true},"80":{"HTTP":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8083"}}},
          "$${TS_CERT_DOMAIN}:80":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8083"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  sidecar:
    restart: unless-stopped
    extends:
      file: ../sidecar-compose.yaml
      service: .simple-sidecar
    hostname: calibre

  calibre:
    image: lscr.io/linuxserver/calibre-web:latest
    network_mode: "service:sidecar"
    restart: unless-stopped
    volumes:
      - blob-media:/books
      - calibre-config:/config
    environment:
      - PGID=1000
      - PUID=1000

volumes:
  tailscale-data:
  blob-media:
    driver: local
    driver_opts:
      type: cifs
      device: //blob.camel-tortoise.ts.net/Media/ebooks/library
      o: username=${BLOB_USERNAME},password=${BLOB_PASSWORD},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,nounix,noserverino
  calibre-config:
    driver: local
    driver_opts:
      type: cifs
      device: //blob.camel-tortoise.ts.net/config/calibre/
      o: username=${BLOB_USERNAME},password=${BLOB_PASSWORD},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,nounix,noserverino
