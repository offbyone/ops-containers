---
# Path where the repository will be cloned
repo_path: "/opt/ansible-docker-compose/ops-containers"

# Path to the rsync binary to invoke on the remote host for the sync step.
# Empty means let rsync use the remote default (PATH lookup). Override per-host
# where the default rsync is unsuitable -- e.g. Synology's /usr/bin/rsync is a
# setuid wrapper that aborts with "rsync service is no running" unless the DSM
# rsync service is enabled; point this at a plain rsync (synocli-net) instead.
sync_rsync_path: ""

# List of services to deploy (should be overridden in host_vars)
#
# Each entry supports:
#   name:          service directory name (required)
#   compose_file:  compose filename within the dir (default: compose.yml)
#   path:          dir override if it differs from name (default: name)
#   up:            false brings the service down instead of up (default: true)
#   systemd:       true supervises the service with a per-service systemd unit
#                  (tasks/systemd.yml) instead of the docker_compose_v2 module.
#                  Requires a real systemd host; leave unset on e.g. Synology.
services: []

# Limit the run to a single service by name (override on the CLI:
# `-e service=minio`). Empty means act on all services.
service: ""

# Pull images before bringing services up (override on the CLI: `-e pull=true`).
# Pulling runs even under --check. When false the compose file's own pull
# policy is used at deploy time.
pull: false

# Pull images but do not bring services up/down (override: `-e pull_only=true`).
# Implies pulling; the deploy step is skipped entirely.
pull_only: false

# Default health check timeout (in seconds)
health_check_timeout: 300

# Default health check retries
health_check_retries: 5

become_for_docker: false
