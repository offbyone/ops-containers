---
# Path where the repository will be cloned
repo_path: "/opt/ansible-docker-compose/ops-containers"

# List of services to deploy (should be overridden in host_vars)
services: []

# Limit the run to a single service by name (override on the CLI:
# `-e service=minio`). Empty means act on all services.
service: ""

# Pull images before bringing services up (override on the CLI: `-e pull=true`).
# Pulling runs even under --check. When false the compose file's own pull
# policy is used at deploy time.
pull: false

# Pull images but do not bring services up/down (override: `-e pull_only=true`).
# Implies pulling; the deploy step is skipped entirely.
pull_only: false

# Default health check timeout (in seconds)
health_check_timeout: 300

# Default health check retries
health_check_retries: 5

become_for_docker: false
