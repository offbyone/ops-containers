---
- name: Sync compose definitions to remote
  ansible.builtin.import_tasks: sync.yml
  tags:
    - sync
    - always

- name: Render service templates to remote
  ansible.builtin.import_tasks: render_templates.yml
  tags:
    - templates
    - always

- name: Include docker compose service tasks
  ansible.builtin.import_tasks: compose.yml
  tags:
    - deploy
    - services
