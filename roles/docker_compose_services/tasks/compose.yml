---
- name: Select services to act on
  ansible.builtin.set_fact:
    # Exclude services flagged `systemd: true`; those are handled by systemd.yml.
    # rejectattr('systemd') keeps entries where the key is absent or false.
    _services: >-
      {{ (services if not service
          else services | selectattr('name', 'equalto', service) | list)
         | rejectattr('systemd') | list }}

# A requested service simply may not be defined on every host (each host's
# services list is its own). Treat that as "nothing to do here" rather than a
# failure, so a single `-e service=foo` run can target the whole inventory
# without erroring on the hosts that don't host foo. Report it for visibility.
- name: Report that the requested service is not defined on this host
  ansible.builtin.debug:
    msg: "Service '{{ service }}' is not defined on {{ inventory_hostname }}; skipping."
  when: service | length > 0 and _services | length == 0

- name: Verify service definitions exist
  ansible.builtin.stat:
    path: "{{ repo_path }}/{{ item.path | default(item.name) }}/{{ item.compose_file | default('compose.yml') }}"
  loop: "{{ _services }}"
  loop_control:
    label: "{{ item.name }}"
  register: service_files

- name: Fail if any service definition doesn't exist
  ansible.builtin.fail:
    msg: "Service definition {{ item.item.name }} not found at {{ repo_path }}/{{ item.item.path | default(item.item.name) }}/{{ item.item.compose_file | default('compose.yml') }}"
  when: not item.stat.exists
  loop: "{{ service_files.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Pull service images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ repo_path }}/{{ item.path | default(item.name) }}"
    files:
      - "{{ item.compose_file | default('compose.yml') }}"
  loop: "{{ _services }}"
  loop_control:
    label: "{{ item.name }}"
  become: "{{ become_for_docker }}"
  # Only pull for services being brought up, when pulling was requested.
  when:
    - pull | bool or pull_only | bool
    - item.up | default(true)
  # Pulling is an explicit request, so do it for real even under --check
  # (unlike `up`, a pull won't touch running containers).
  check_mode: false

- name: Deploy services (up unless up=false brings them down)
  community.docker.docker_compose_v2:
    # `wait` is skipped under --check: the module's dry-run can't actually
    # wait for health and reports any currently-exited container as a
    # failure ("container X exited (0)"), which is a false positive.
    wait: "{{ not ansible_check_mode }}"
    project_src: "{{ repo_path }}/{{ item.path | default(item.name) }}"
    files:
      - "{{ item.compose_file | default('compose.yml') }}"
    # `up: false` on a service brings it down; otherwise it is brought up.
    state: "{{ 'present' if item.up | default(true) else 'absent' }}"
    # Image pulling is handled by the dedicated "Pull service images" task
    # above (which also works under --check), so use the compose pull policy.
    pull: policy
    remove_orphans: true
  loop: "{{ _services }}"
  loop_control:
    label: "{{ item.name }} ({{ 'up' if item.up | default(true) else 'down' }})"
  register: compose_result
  become: "{{ become_for_docker }}"
  # `pull_only` skips the up/down deploy entirely.
  when: not pull_only | bool
  # Under --check the module runs `docker compose up --dry-run`, which evaluates
  # `depends_on` health conditions against the *current* container state. A
  # pre-existing stopped/unhealthy container (or a dependent of one) is then
  # reported as a failure even though no deploy was attempted. Don't fail the
  # play for those dry-run artifacts; they are surfaced as a warning below.
  failed_when: not ansible_check_mode and compose_result.failed | default(false)

- name: Warn about services that could not be previewed under --check
  ansible.builtin.debug:
    msg: "{{ item.item.name }} could not be previewed: {{ (item.msg | default('')).splitlines() | map('trim') | reject('equalto', '') | list | last | default('unknown error') }}"
  loop: "{{ compose_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - ansible_check_mode
    - item.rc | default(0) | int != 0
