---
- name: Ensure destination directory exists
  ansible.builtin.file:
    path: "{{ repo_path }}"
    state: directory
    mode: "0755"

# Honour `-e service=<name>` the same way compose.yml and render_templates.yml
# do: sync every service, or just the requested one. Scoping the sync to the
# selected service(s) means a single-service run only copies that service's
# files instead of the whole tree.
- name: Build the list of service directories to sync
  ansible.builtin.set_fact:
    _sync_dirs: >-
      {{ (services if not service
          else services | selectattr('name', 'equalto', service) | list)
         | map(attribute='name')
         | list }}

# git is the source of truth for *which* files to copy. `git ls-files` lists
# only tracked files, so it inherently honours every .gitignore in the tree
# (what the old rsync setup needed `--filter=':- .gitignore'` for) and never
# picks up runtime state (rendered *.env, container data dirs) that lives
# alongside the repo content on the remote. sidecar-compose.yaml is a repo-root
# file that service compose files reference via `extends: ../sidecar-compose.yaml`,
# so it must always be present even on a single-service run.
- name: Enumerate tracked files for the selected services
  ansible.builtin.command:
    argv: "{{ ['git', 'ls-files', '--'] + _sync_dirs + ['sidecar-compose.yaml'] }}"
    chdir: "{{ playbook_dir }}"
  delegate_to: localhost
  changed_when: false
  check_mode: false
  register: _tracked_files
  when: _sync_dirs | length > 0

# *.template files are rendered separately by render_templates.yml; only their
# rendered output should land on the remote, so drop them here.
- name: Compute the list of files to copy
  ansible.builtin.set_fact:
    _sync_files: >-
      {{ _tracked_files.stdout_lines
         | reject('search', '\.template$')
         | list }}
  when: _sync_dirs | length > 0

# copy is idempotent via checksum and renders real per-file content under
# --diff, so there is no need for the rsync itemize-changes summary machinery.
# It never deletes, which preserves the remote's runtime state (whole-service
# removal stays the job of playbook-cleanup-unmanaged.yml).
- name: Copy service files to remote
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/{{ item }}"
    dest: "{{ repo_path }}/{{ item }}"
    mode: preserve
  loop: "{{ _sync_files | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when: _sync_dirs | length > 0
