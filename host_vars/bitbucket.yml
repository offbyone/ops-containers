# sudo on bitbucket authenticates via pam_ssh_agent_auth against the forwarded
# SSH agent (no password). Ansible's ControlMaster/pipelining connection does not
# reliably carry the agent into the multiplexed `sudo` session, so forward it
# explicitly here -- required for `become: true` (e.g. installing systemd units).
ansible_ssh_common_args: "-o ForwardAgent=yes"

