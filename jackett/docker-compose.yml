---
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true},"80":{"HTTP":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:9117"}}},
          "$${TS_CERT_DOMAIN}:80":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:9117"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  sidecar:
    extends:
      file: ../sidecar-compose.yaml
      service: .simple-sidecar
    hostname: jackett

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    network_mode: "service:sidecar"
    restart: always
    volumes:
      - blob-media:/media
      - jackett-config:/config
    environment:
      - PGID=1000
      - PUID=1000
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  tailscale-data:
  blob-media:
    driver: local
    driver_opts:
      type: cifs
      device: //blob.camel-tortoise.ts.net/Media
      o: username=${BLOB_USERNAME},password=${BLOB_PASSWORD},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,nounix,noserverino
  jackett-config:
    driver: local
    driver_opts:
      type: none
      device: /etc/jackett
      o: bind
