---
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true},"80":{"HTTP":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8787"}}},
          "$${TS_CERT_DOMAIN}:80":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8787"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  sidecar:
    restart: unless-stopped
    extends:
      file: ../sidecar-compose.yaml
      service: .simple-sidecar
    hostname: readarr

  service:
    image: lscr.io/linuxserver/readarr:develop
    environment:
      - TZ=Etc/UTC
    volumes:
      - /etc/readarr/:/config
      - blob-media:/books
    network_mode: "service:sidecar"
    restart: always

  exporter:
    image: ghcr.io/onedr0p/exportarr:latest
    command: readarr
    restart: always
    network_mode: "service:sidecar"
    environment:
      - PORT=9707
      - URL=http://localhost:8787
    # APIKEY must be set in here
    env_file: .exportarr.env

volumes:
  tailscale-data:
  blob-media:
    driver: local
    driver_opts:
      type: cifs
      device: //blob.camel-tortoise.ts.net/Media/ebooks/library
      o: username=${BLOB_USERNAME},password=${BLOB_PASSWORD},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,nounix,noserverino
